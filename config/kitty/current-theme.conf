## license: MIT
## upstream: https://github.com/atelierbram/Base2Tone-kitty/blob/main/themes/base2tone-lavender-dark.conf
## blurb: duotone theme | blue lavender violet - magenta


#: The basic colors

foreground #e0e8f0
background #0a0a1a
selection_foreground #e0e8f0
selection_background #1a1a2e

# Cursor - bright neon blue block cursor
cursor #00d4ff
cursor_text_color #0a0a1a

# URL underline color
url_color #80d4ff

# Window borders - neon blue accent
active_border_color #00d4ff
inactive_border_color #1a1a2e
bell_border_color #00d4ff
visual_bell_color none

# OS Window titlebar
wayland_titlebar_color #0a0a1a
macos_titlebar_color #0a0a1a

# Tab bar
active_tab_foreground #ffffff
active_tab_background #0a0a1a
inactive_tab_foreground #80a0b0
inactive_tab_background #1a1a2e
tab_bar_background #1a1a2e
tab_bar_margin_color none

# Marks
mark1_foreground #0a0a1a
mark1_background #00d4ff
mark2_foreground #0a0a1a
mark2_background #0088aa
mark3_foreground #0a0a1a
mark3_background #00ffff

# Basic 16 colors - dark blue base with neon blue accents
# black
color0 #0a0a1a
color8 #2a2a4a
# red
color1 #ff4488
color9 #ff88aa
# green
color2 #00d4aa
color10 #40ffcc
# yellow
color3 #ffd700
color11 #ffee80
# blue - neon blue accent
color4 #00d4ff
color12 #80e4ff
# magenta
color5 #ff00ff
color13 #ff80ff
# cyan
color6 #00ffff
color14 #80ffff
# white
color7 #e0e8f0
